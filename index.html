<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Download | Offline Communicator</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: #121212;
            color: #ffffff;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            text-align: center;
        }
        .container {
            padding: 40px;
            background-color: #1e1e1e;
            border-radius: 16px;
            box-shadow: 0 8px 24px rgba(0,0,0,0.5);
            max-width: 400px;
            width: 90%;
        }
        h1 { margin-bottom: 8px; font-size: 24px; }
        p { color: #aaaaaa; margin-bottom: 32px; font-size: 14px; }
        .download-btn {
            background-color: #00ff88;
            color: #000000;
            text-decoration: none;
            padding: 16px 32px;
            border-radius: 8px;
            font-weight: bold;
            font-size: 16px;
            display: inline-block;
            transition: transform 0.2s, background-color 0.2s;
        }
        .download-btn:hover { background-color: #00e67a; }
        .download-btn:active { transform: scale(0.95); }
        .version { margin-top: 16px; font-size: 12px; color: #666; }
    </style>
</head>
<body>
    <div class="container">
        <h1>Offline Communicator</h1>
        <p>ESP32 Peer-to-Peer Interface</p>
        
        <a href="offline-communicator-v2.apk" class="download-btn" download>
            Download V2 App (APK)
        </a>
        
        <div class="version">Version 2.0 (Hive DB + BLE Fix)</div>
    </div>
</body>
</html>
